# ============================================================
# KadrGo — Nginx Production Konfiguratsiyasi
# /etc/nginx/sites-available/kadrgo.uz
# ============================================================

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name kadrgo.uz www.kadrgo.uz;
    return 301 https://kadrgo.uz$request_uri;
}

# www -> non-www redirect
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.kadrgo.uz;

    ssl_certificate /etc/letsencrypt/live/kadrgo.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kadrgo.uz/privkey.pem;

    return 301 https://kadrgo.uz$request_uri;
}

# Asosiy server bloki
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kadrgo.uz;

    root /var/www/kadrgo/public;
    index index.php;

    charset utf-8;

    # ─── SSL sozlamalari ───
    ssl_certificate /etc/letsencrypt/live/kadrgo.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kadrgo.uz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ─── Xavfsizlik headerlari ───
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── Fayl yuklash limiti ───
    client_max_body_size 15M;

    # ─── Gzip siqish ───
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # ─── Statik fayllar (1 yil cache) ───
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ─── Mini App (SPA) ───
    location /miniapp {
        alias /var/www/kadrgo/public/miniapp;
        try_files $uri $uri/ /miniapp/index.html;

        # Mini App fayllar cache
        location ~* \.(js|css)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ─── Laravel ───
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ─── PHP-FPM ───
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 60;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    # ─── Himoyalangan fayllar ───
    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~ \.env {
        deny all;
    }

    # ─── Health check ───
    location /up {
        access_log off;
        try_files $uri /index.php?$query_string;
    }

    # ─── Telegram webhook (rate limit) ───
    location /api/webhook/telegram {
        # Rate limit: 30 request/soniya
        limit_req zone=telegram burst=50 nodelay;
        try_files $uri /index.php?$query_string;
    }

    # ─── Loglar ───
    access_log /var/log/nginx/kadrgo-access.log;
    error_log /var/log/nginx/kadrgo-error.log warn;
}

# ─── Rate limit zonasi (http blokiga qo'shiladi) ───
# /etc/nginx/conf.d/rate-limit.conf fayliga qo'shing:
# limit_req_zone $binary_remote_addr zone=telegram:10m rate=30r/s;

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="80" r="200" fill="white" opacity="0.03"/>
  <circle cx="150" cy="550" r="150" fill="white" opacity="0.03"/>

  <!-- Logo icon (K+G mark) -->
  <g transform="translate(500, 160)">
    <rect x="0" y="0" width="80" height="80" rx="18" fill="#0D9488"/>
    <path d="M25 20L25 60" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <path d="M25 40L47 20" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <path d="M25 40L47 60" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <path d="M52 28L62 28L62 52L52 52" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Brand name -->
  <text x="600" y="310" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="72" fill="white" letter-spacing="3">
    <tspan fill="#5EEAD4">KADR</tspan><tspan fill="#F59E0B">GO</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="370" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="28" fill="#94A3B8">
    kadrlar harakatda!
  </text>

  <!-- Description -->
  <text x="600" y="440" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="22" fill="#CBD5E1">
    O'zbekistondagi eng yirik ish qidirish platformasi
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#0D9488" opacity="0.3"/>
  <text x="600" y="618" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="18" fill="#5EEAD4">
    kadrgo.uz  |  @kadrgobot
  </text>
</svg>
